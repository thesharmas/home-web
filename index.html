<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit's Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: "IBM Plex Mono", ui-monospace, monospace; }
        .term-dark {
            background: #050806;
            color: #c8f5c8;
        }
        .term-light {
            background: #ecece4;
            color: #1a1a12;
        }
        .term-scanlines {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 2;
            opacity: 0.06;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.45) 2px,
                rgba(0, 0, 0, 0.45) 3px
            );
        }
        .term-light .term-scanlines {
            opacity: 0.04;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.12) 2px,
                rgba(0, 0, 0, 0.12) 3px
            );
        }
        @media (prefers-reduced-motion: reduce) {
            .term-cursor { animation: none !important; }
        }
        .term-cursor::after {
            content: "▌";
            animation: termBlink 1.1s steps(2, end) infinite;
            color: currentColor;
            opacity: 0.85;
        }
        @keyframes termBlink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .home-photo-hover { transition: none !important; }
        }
    </style>
</head>
<body class="min-h-screen antialiased transition-colors duration-200 font-mono text-sm"
      x-data="{ darkMode: true }"
      :class="{ 'term-dark term-page-dark': darkMode, 'term-light term-page-light': !darkMode }">
    <div class="term-scanlines" aria-hidden="true"></div>

    <div class="absolute top-4 left-4 z-50 flex items-center gap-2">
        <button type="button" @click="darkMode = !darkMode"
                class="border px-3 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition-colors"
                :class="darkMode ? 'border-emerald-500/40 text-emerald-200 hover:bg-emerald-500/10' : 'border-gray-800 text-gray-900 hover:bg-black/5'"
                aria-label="Toggle color mode">
            <span x-text="darkMode ? 'lite' : 'drk'"></span>
        </button>
    </div>

    <section class="relative z-10 min-h-screen flex flex-col md:grid md:grid-cols-2 md:items-stretch">
        <div class="px-4 py-16 sm:px-8 md:py-20 md:flex md:flex-col md:justify-center fade-in">
            <!-- Profile image — mobile -->
            <div class="md:hidden mb-10 flex justify-center">
                <div class="border overflow-hidden w-44 h-44 sm:w-52 sm:h-52"
                     :class="darkMode ? 'border-emerald-500/35 bg-black/40' : 'border-gray-800 bg-white'">
                    <img src="assets/IMG_2096.jpg" alt="Rohit's profile photo"
                         class="w-full h-full object-cover" width="400" height="400" decoding="async">
                </div>
            </div>

            <div class="max-w-xl mx-auto md:mx-0 w-full">
                <p class="text-[10px] font-bold uppercase tracking-[0.35em] mb-3"
                   :class="darkMode ? 'text-emerald-500/70' : 'text-gray-600'">
                    ~/home
                </p>
                <h1 class="mb-4 text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight uppercase leading-tight term-cursor"
                    :class="darkMode ? 'text-emerald-100' : 'text-gray-900'">
                    Hi, I'm Rohit
                </h1>
                <p class="mb-10 max-w-lg leading-relaxed"
                   :class="darkMode ? 'text-emerald-200/75' : 'text-gray-700'">
                    I'm a founder based in the SF Bay area
                </p>

                <div class="flex flex-col gap-3">
                    <div class="flex flex-wrap gap-3">
                        <a href="https://monetarymusings.substack.com/"
                           target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center gap-2 border px-4 py-2.5 text-xs font-bold uppercase tracking-widest transition-colors"
                           :class="darkMode ? 'border-orange-400/45 text-orange-200 hover:bg-orange-500/10' : 'border-gray-800 text-gray-900 hover:bg-black/5'">
                            <span class="text-[10px] opacity-70">[ss]</span> Substack
                        </a>
                        <a href="https://www.linkedin.com/in/rohitnsharma/"
                           target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center gap-2 border px-4 py-2.5 text-xs font-bold uppercase tracking-widest transition-colors"
                           :class="darkMode ? 'border-sky-400/45 text-sky-200 hover:bg-sky-500/10' : 'border-gray-800 text-gray-900 hover:bg-black/5'">
                            <span class="text-[10px] opacity-70">[in]</span> LinkedIn
                        </a>
                        <a href="https://x.com/rnsharma"
                           target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center gap-2 border px-4 py-2.5 text-xs font-bold uppercase tracking-widest transition-colors"
                           :class="darkMode ? 'border-gray-400/50 text-gray-200 hover:bg-white/5' : 'border-gray-800 text-gray-900 hover:bg-black/5'">
                            <span class="text-[10px] opacity-70">[x]</span> Twitter
                        </a>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <a href="https://github.com/thesharmas/Credit-Underwriter-Agent"
                           target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center gap-2 border px-4 py-2.5 text-xs font-bold uppercase tracking-widest transition-colors"
                           :class="darkMode ? 'border-violet-400/45 text-violet-200 hover:bg-violet-500/10' : 'border-gray-800 text-gray-900 hover:bg-black/5'">
                            <span class="text-[10px] opacity-70">[gh]</span> GitHub
                        </a>
                        <a href="music.html"
                           class="inline-flex items-center gap-2 border px-4 py-2.5 text-xs font-bold uppercase tracking-widest transition-colors"
                           :class="darkMode ? 'border-cyan-400/45 text-cyan-200 hover:bg-cyan-500/10' : 'border-gray-800 text-gray-900 hover:bg-black/5'">
                            <span class="text-[10px] opacity-70">[♪]</span> Music
                        </a>
                    </div>
                </div>
            </div>

            <div class="mt-12 max-w-xl mx-auto md:mx-0 w-full space-y-6">
                <div class="border p-5"
                     :class="darkMode ? 'border-emerald-500/25 bg-black/30' : 'border-gray-800 bg-white'">
                    <h2 class="text-[10px] font-bold uppercase tracking-[0.3em] mb-4"
                        :class="darkMode ? 'text-cyan-400/85' : 'text-cyan-900'">work</h2>
                    <div class="flex items-center gap-4">
                        <img src="assets/kanmon_logoicon_bw_white.svg"
                             alt=""
                             class="w-14 h-14 object-contain shrink-0"
                             :class="darkMode ? '' : 'invert'">
                        <div>
                            <a href="https://www.kanmon.com"
                               target="_blank" rel="noopener noreferrer"
                               class="group">
                                <h3 class="text-lg font-bold uppercase tracking-wide transition-colors"
                                    :class="darkMode ? 'text-emerald-100 group-hover:text-cyan-400' : 'text-gray-900 group-hover:text-cyan-800'">
                                    Kanmon
                                </h3>
                            </a>
                            <p class="text-xs mt-1"
                               :class="darkMode ? 'text-emerald-200/55' : 'text-gray-600'">Co-founder</p>
                        </div>
                    </div>
                </div>

                <div class="border p-5"
                     :class="darkMode ? 'border-emerald-500/25 bg-black/30' : 'border-gray-800 bg-white'">
                    <h2 class="text-[10px] font-bold uppercase tracking-[0.3em] mb-4"
                        :class="darkMode ? 'text-violet-400/85' : 'text-violet-900'">interests</h2>
                    <ul class="space-y-2 text-xs sm:text-sm"
                        :class="darkMode ? 'text-emerald-200/70' : 'text-gray-700'">
                        <li class="flex items-start gap-2">
                            <span class="text-emerald-500/80 shrink-0" aria-hidden="true">»</span>
                            Fintech
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-emerald-500/80 shrink-0" aria-hidden="true">»</span>
                            AI/ML
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-emerald-500/80 shrink-0" aria-hidden="true">»</span>
                            Dev Tools
                        </li>
                    </ul>
                </div>
            </div>

            <footer class="mt-12 max-w-xl mx-auto md:mx-0 w-full border-t pt-5 text-[10px] uppercase tracking-[0.25em]"
                    :class="darkMode ? 'border-emerald-500/20 text-emerald-500/50' : 'border-gray-300 text-gray-500'">
                eof
            </footer>
        </div>

        <!-- Desktop photo: wide portrait, soft edge (no frame box) -->
        <div class="relative hidden md:flex h-full min-h-0 flex-col items-center justify-center border-l px-8 py-12 lg:px-16 lg:py-16"
             :class="darkMode ? 'border-emerald-500/20' : 'border-gray-800/40'">
            <figure class="w-full max-w-[min(100%,30rem)] lg:max-w-[36rem]">
                <div class="home-photo-hover w-full transition-transform duration-500 motion-safe:hover:scale-[1.008]"
                     :class="darkMode
                         ? 'shadow-[0_28px_90px_-28px_rgba(0,0,0,0.75)]'
                         : 'shadow-[0_24px_70px_-24px_rgba(0,0,0,0.22)]'">
                    <div class="relative aspect-[3/4] w-full overflow-hidden rounded-[2px]">
                        <img src="assets/IMG_2096.jpg"
                             alt="Portrait with the Golden Gate Bridge in San Francisco"
                             class="home-photo-hover h-full w-full object-cover object-[50%_22%] motion-safe:transition motion-safe:duration-700 motion-safe:ease-out motion-safe:hover:object-[50%_20%]"
                             width="1200" height="1600" decoding="async">
                        <div class="pointer-events-none absolute inset-0 z-[1] bg-gradient-to-t via-transparent"
                             :class="darkMode
                                 ? 'from-black/35 to-black/15 mix-blend-multiply'
                                 : 'from-gray-900/12 to-gray-800/5'"
                             aria-hidden="true"></div>
                    </div>
                </div>
                <figcaption class="mt-4 text-center text-[10px] font-bold uppercase tracking-[0.22em] leading-relaxed"
                              :class="darkMode ? 'text-emerald-500/60' : 'text-gray-500'">
                    San Francisco · Golden Gate Bridge
                </figcaption>
            </figure>
        </div>
    </section>
</body>
</html>
